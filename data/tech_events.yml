# ════════════════════════════════════════════════════════════════════
#  tech_events.yml - curated technology events (manual source of truth)
# ════════════════════════════════════════════════════════════════════
#  collect_events.py reads this file + event_sources.yml, computes each
#  event's lifecycle state (upcoming / happening_today / recent / archived)
#  from start_date & end_date relative to "today", and writes only the
#  ACTIVE (non-archived) events to data/runs/YYYY-MM-DD/events_validated.json.
#
#  IMPORTANT OPERATING RULES
#   • Do NOT rewrite this file just because dates rolled by - the collector
#     derives state dynamically. Update an entry only when NEW official
#     dates are published.
#   • Every event MUST have a real source_url (no fabricated events).
#   • Dates are ISO strings "YYYY-MM-DD". If an event is a single day, set
#     end_date == start_date.
#   • Fields map to schemas.py :: EventItem (event_state is computed, not set
#     here). relevance_tags drive the "why it's on Aniket's radar" filter.
#
#  All dates below were verified against official event pages (June 2026).
# ════════════════════════════════════════════════════════════════════

settings:
  recent_window_days: 30      # how long a concluded event stays in "Recent Highlights"
  upcoming_horizon_days: 210  # how far ahead to surface "Upcoming" events
  home_region: "New York, NY" # boosts NYC-area events in relevance ranking

