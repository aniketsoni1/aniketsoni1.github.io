# ════════════════════════════════════════════════════════════════════
#  computing_history.yml - "This Day in Computing History" corpus
# ════════════════════════════════════════════════════════════════════
#  Curated, source-linked milestones. collect_history.py selects the best
#  match for the current date:
#    1. exact month-day match  → pick highest `importance`
#    2. else nearest day in the SAME month (within ±window)
#    3. else a `general_fallbacks` entry (undated, evergreen)
#
#  Fields map to schemas.py :: HistoryItem
#    date        : "MM-DD" (zero-padded)   - omit for general_fallbacks
#    year        : integer
#    title       : short headline
#    description : 1–2 sentence factual note (no embellishment)
#    category    : hardware | software | networking | internet | web | ai |
#                  programming_languages | databases | pioneers | mobile | os
#    source_url  : authoritative reference (Wikipedia / primary source)
#    importance  : 0.0–1.0 editorial weight (tie-breaker on shared dates)
#    confidence  : 0.0–1.0 certainty of the date itself
#
#  These are stable historical facts. Where an exact calendar day is
#  genuinely uncertain, the item lives in `general_fallbacks` instead of
#  being given a fabricated date.
# ════════════════════════════════════════════════════════════════════

