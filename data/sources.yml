# ════════════════════════════════════════════════════════════════════
#  sources.yml — the ingestion registry for The Daily Tech Signal
# ════════════════════════════════════════════════════════════════════
#  Each entry describes ONE source. The collector (scripts/collect_news.py)
#  reads every entry, fetches its `feed` (RSS/Atom) when present, and tags
#  each story with `category` + `source_type` + a baseline `trust` score.
#
#  Fields (validated by scripts/schemas.py :: SourceConfig):
#    name        : human-readable source name           (required)
#    category     : one of the category slugs below       (required)
#    source_type  : official_blog | product_blog | research | news |
#                   aggregator | release_notes            (required)
#    feed         : RSS/Atom URL, or null if none         (optional)
#    homepage     : canonical site URL                    (required)
#    trust        : 0.0–1.0 baseline confidence for items (required)
#    enabled      : set false to skip without deleting     (default true)
#
#  A dead / moved feed is NOT fatal — collect_news.py logs it and moves on.
#  To add a source, copy a block and adjust. To silence one, set enabled:false.
# ════════════════════════════════════════════════════════════════════

defaults:
  max_items_per_feed: 12      # cap stories pulled from any single feed
  request_timeout: 20         # seconds
  user_agent: "DailyTechSignal/1.0 (+https://aniketsoni.com)"
  lookback_hours: 48          # ignore items older than this window
  min_title_chars: 16         # drop junk / empty headlines

sources:

  # ── AI model companies ────────────────────────────────────────────
  - name: "OpenAI"
    category: ai_model_companies
    source_type: official_blog
    feed: "https://openai.com/news/rss.xml"
    homepage: "https://openai.com/news/"
    trust: 0.95
  - name: "Anthropic"
    category: ai_model_companies
    source_type: official_blog
    # Anthropic publishes no RSS. This Google News query proxies their /news
    # section (last 7 days). CAVEAT: item links are news.google.com redirect
    # URLs, not anthropic.com — they resolve fine for readers and pass link
    # validation, but the collector strips Google's " - Anthropic" title
    # suffix. If Anthropic ever ships a real feed, swap it in here.
    feed: "https://news.google.com/rss/search?q=site:anthropic.com/news+when:7d&hl=en-US&gl=US&ceid=US:en"
    homepage: "https://www.anthropic.com/news"
    trust: 0.95
