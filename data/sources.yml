  # ── Mainstream press (tech desks of general-audience outlets) ─────
  # Kept in their own category (not enterprise_technology) because their
  # trust semantics differ from vendor blogs, and the category surfaces as
  # a "Mainstream Press" tag on posts. Story links are often paywalled —
  # that's fine: validate_urls treats 403/429 bot-blocks as "present".
  # These feed URLs shift periodically at the publishers; a dead one is
  # logged and skipped by the collector, never fatal (check bronze logs).
  - name: "The New York Times — Technology"
    category: mainstream_press
    source_type: news
