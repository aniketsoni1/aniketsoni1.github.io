name: Weekly Signal Perspective

# ════════════════════════════════════════════════════════════════════
#  Weekly thought-leadership column — Sundays at 10:00 America/New_York.
#
#    guard ──► gold-generate ──► publish
#    (time)    (aggregate week   (commit verified
#               + render + gate)  column)
#
#  No collection stage: the column is grounded entirely in the week's
#  already-committed data/runs/*/daily_signal_payload.json files, so a
#  plain checkout carries all its inputs.
#
#  Same DST technique as the daily engine: two UTC crons + an ET guard.
#     14:00 UTC → 10:00 EDT (Mar–Nov)   ·   15:00 UTC → 10:00 EST (Nov–Mar)
# ════════════════════════════════════════════════════════════════════
on:
  schedule:
    - cron: "0 14 * * 0"   # 10:00 America/New_York on Sundays during EDT
    - cron: "0 15 * * 0"   # 10:00 America/New_York on Sundays during EST
  workflow_dispatch:        # manual trigger (always runs, bypasses the guard)

permissions:
  contents: write

concurrency:
  group: weekly-signal-perspective
  cancel-in-progress: false

jobs:
  # ── Stage 0 · Guard ─────────────────────────────────────────────────
  guard:
    name: "⏰ Guard — Sunday 10:00 ET (DST-safe)"
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Decide whether this trigger should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ='America/New_York' date +%H)
          DOW=$(TZ='America/New_York' date +%u)   # 7 = Sunday
          echo "America/New_York now: day=$DOW hour=$HOUR"
          if [ "$DOW" = "7" ] && [ "$HOUR" = "10" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not Sunday 10:00 ET — this cron no-ops."
          fi

  # ── Stage 1 · Gold — aggregate the week, render, gate ───────────────
  gold-generate:
    name: "🥇 Gold — Aggregate week + render + gate"
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      # AI is used only for essay language; the deterministic fallback keeps
      # the column publishable with zero configured providers.
      - name: Generate Weekly Perspective
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: python scripts/generate_perspective.py

      # Final publish gate — if this fails, NOTHING is committed.
      - name: Validate Weekly Perspective
        run: python scripts/validate_perspective.py

      - name: Hand off run data + audit trail
        uses: actions/upload-artifact@v4
        with:
          name: perspective-run-data
          path: data/runs
          retention-days: 7
          if-no-files-found: error

      - name: Hand off rendered column
        uses: actions/upload-artifact@v4
        with:
          name: perspective-post
          path: _posts/*.md
          retention-days: 7
          if-no-files-found: error

  # ── Stage 2 · Publish — commit only the verified column ─────────────
  publish:
    name: "🚀 Publish — Commit verified column"
    needs: gold-generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull run data
        uses: actions/download-artifact@v4
        with:
          name: perspective-run-data
          path: data/runs

      - name: Pull rendered column
        uses: actions/download-artifact@v4
        with:
          name: perspective-post
          path: _posts

      - name: Commit and Push Verified Column
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "site(perspective): weekly signal perspective column"
          file_pattern: "_posts/*.md data/runs/**/*.json"
          commit_user_name: "daily-tech-signal-bot"
          commit_user_email: "actions@github.com"
