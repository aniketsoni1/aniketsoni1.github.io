name: Weekly Signal Perspective

# ════════════════════════════════════════════════════════════════════
#  Weekly thought-leadership column — Sundays at 10:00 America/New_York.
#  Full medallion pipeline, mirroring the daily engine:
#
#    guard ──► bronze-aggregate ──► silver-validate ──► gold-generate ──► publish
#    (time)    (aggregate week's    (schema gate on     (render + AI      (commit)
#               payloads + link      the aggregate)      language + gate)
#               re-validation)
#
#  The bronze layer's inputs are the week's already-committed
#  data/runs/*/daily_signal_payload.json files, so checkout carries them.
#  Between jobs, data moves via workflow artifacts.
#
#  Uses the native `timezone:` cron key (DST handled by GitHub). The guard
#  keeps a Sunday + 10:00–12:59 ET sanity window, tolerant of scheduler lag.
# ════════════════════════════════════════════════════════════════════
on:
  schedule:
    - cron: "0 10 * * 0"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-signal-perspective
  cancel-in-progress: false

jobs:
  # ── Stage 0 · Guard ─────────────────────────────────────────────────
  guard:
    name: "⏰ Guard — Sunday 10:00 ET (DST-safe)"
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Decide whether this trigger should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ='America/New_York' date +%H)
          DOW=$(TZ='America/New_York' date +%u)   # 7 = Sunday
          echo "America/New_York now: day=$DOW hour=$HOUR"
          # Accept Sunday 10–12 ET (scheduler can fire late).
          if [ "$DOW" = "7" ] && { [ "$HOUR" = "10" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ]; }; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Outside the Sunday 10:00–12:59 ET window — no-op."
          fi

  # ── Stage 1 · Bronze — aggregate the week + link re-validation ──────
  bronze-aggregate:
    name: "🥉 Bronze — Aggregate week's signals"
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      # Deterministic: theme selection by counting, citation links re-checked.
      - name: Aggregate Week's Payloads
        run: python scripts/aggregate_week.py

      - name: Hand off bronze layer (aggregated week payload)
        uses: actions/upload-artifact@v4
        with:
          name: perspective-bronze
          path: data/runs
          retention-days: 7
          if-no-files-found: error

  # ── Stage 2 · Silver — schema/Pydantic gate on the aggregate ────────
  silver-validate:
    name: "🥈 Silver — Validate week payload"
    needs: bronze-aggregate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull bronze layer
        uses: actions/download-artifact@v4
        with:
          name: perspective-bronze
          path: data/runs

      - name: Validate Week Payload
        run: python scripts/validate_week_payload.py

      - name: Hand off silver layer (validated week payload)
        uses: actions/upload-artifact@v4
        with:
          name: perspective-silver
          path: data/runs
          retention-days: 7
          if-no-files-found: error

  # ── Stage 3 · Gold — render + AI language + final publish gate ──────
  gold-generate:
    name: "🥇 Gold — Render column + final gate"
    needs: silver-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull silver layer
        uses: actions/download-artifact@v4
        with:
          name: perspective-silver
          path: data/runs

      # AI is used only for essay language; the deterministic fallback keeps
      # the column publishable with zero configured providers.
      - name: Generate Weekly Perspective
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: python scripts/generate_perspective.py

      # Final publish gate — if this fails, NOTHING is committed.
      - name: Validate Weekly Perspective
        run: python scripts/validate_perspective.py

      - name: Hand off gold layer (run data + audit trail)
        uses: actions/upload-artifact@v4
        with:
          name: perspective-gold
          path: data/runs
          retention-days: 7
          if-no-files-found: error

      - name: Hand off rendered column
        uses: actions/upload-artifact@v4
        with:
          name: perspective-post
          path: _posts/*.md
          retention-days: 7
          if-no-files-found: error

  # ── Stage 4 · Publish — commit only the verified column ─────────────
  publish:
    name: "🚀 Publish — Commit verified column"
    needs: gold-generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull gold layer
        uses: actions/download-artifact@v4
        with:
          name: perspective-gold
          path: data/runs

      - name: Pull rendered column
        uses: actions/download-artifact@v4
        with:
          name: perspective-post
          path: _posts

      - name: Commit and Push Verified Column
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "site(perspective): weekly signal perspective column"
          file_pattern: "_posts/*.md data/runs/**/*.json"
          commit_user_name: "daily-tech-signal-bot"
          commit_user_email: "actions@github.com"
