name: Daily Tech Signal Engine

# ════════════════════════════════════════════════════════════════════
#  Schedule note (IMPORTANT)
#  GitHub Actions cron runs in UTC only. The `timezone:` sub-key that some
#  guides show under a cron entry is NOT supported and is silently ignored.
#  To publish at 09:00 America/New_York year-round (across DST) we register
#  TWO UTC crons and gate them with a small shell guard so exactly one fires
#  at local 09:00:
#     13:00 UTC → 09:00 EDT (Mar–Nov, UTC-4)
#     14:00 UTC → 09:00 EST (Nov–Mar, UTC-5)
#  The "09:00 ET guard" step below lets only the correct one proceed.
# ════════════════════════════════════════════════════════════════════
on:
  schedule:
    - cron: "0 13 * * *"   # 09:00 America/New_York during EDT
    - cron: "0 14 * * *"   # 09:00 America/New_York during EST
  workflow_dispatch:        # manual trigger (always runs, bypasses the guard)

permissions:
  contents: write

# Never let two runs publish on top of each other.
concurrency:
  group: daily-tech-signal
  cancel-in-progress: false

jobs:
  build-and-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Gate: proceed only at local 09:00 ET for scheduled runs; always
      # proceed for manual workflow_dispatch.
      - name: 09:00 ET guard (DST-safe)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ='America/New_York' date +%H)
          echo "Current America/New_York hour: $HOUR"
          if [ "$HOUR" = "09" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 09:00 ET — this cron will no-op (the other cron handles the active DST offset)."
          fi

      - name: Set up Python Environment
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        if: steps.guard.outputs.run == 'true'
        run: pip install -r scripts/requirements.txt

      # ── Ingestion + normalization + curated collection ──
      # All AI secrets are passed through, but ONLY those actually set as repo
      # secrets will be non-empty. Missing optional secrets do NOT fail the run;
      # the provider layer simply falls through to the next available provider
      # (and ultimately to the deterministic, non-AI fallback).
      - name: Collect News, Events, and History
        if: steps.guard.outputs.run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          python scripts/collect_news.py
          python scripts/collect_events.py
          python scripts/collect_history.py

      # ── Schema/Pydantic validation gate ──
      - name: Validate Structured Payloads
        if: steps.guard.outputs.run == 'true'
        run: python scripts/validate_payloads.py

      # ── Deterministic Jinja2 rendering (AI only for language) ──
      - name: Generate Jekyll Markdown Post
        if: steps.guard.outputs.run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: python scripts/generate_post.py

      # ── Final publish gate: link validation + integrity checks. If this
      #    fails, the workflow stops here and NOTHING is committed. ──
      - name: Validate Final Post
        if: steps.guard.outputs.run == 'true'
        run: python scripts/validate_post.py

      # ── Commit only the verified post + its audit trail ──
      - name: Commit and Push Verified Signal
        if: steps.guard.outputs.run == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "site(signal): automated daily tech signal"
          file_pattern: "_posts/*.md data/runs/**/*.json"
          commit_user_name: "daily-tech-signal-bot"
          commit_user_email: "actions@github.com"
