name: Daily Tech Signal Engine

# ════════════════════════════════════════════════════════════════════
#  MEDALLION PIPELINE - each layer is its own job, so the Actions graph
#  shows exactly where a run stops if something fails:
#
#    guard ──► bronze-collect ──► silver-validate ──► gold-generate ──► publish
#    (time)    (raw ingestion)    (schema gate)       (render + gate)   (commit)
#
#  Data moves between jobs via workflow artifacts (data/runs/<date>/,
#  plus the rendered _posts/*.md from gold onward).
#
#  Schedule note
#  Uses GitHub Actions' native `timezone:` on the cron (supported since
#  March 2026) - DST is handled automatically. The guard keeps a sanity
#  window (09:00–11:59 ET) because GitHub's scheduler can fire 15 min to
#  2+ hours late at peak; a drifted run must still publish.
# ════════════════════════════════════════════════════════════════════
on:
  schedule:
    - cron: "24 9 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

permissions:
  contents: write

# Never let two runs publish on top of each other.
concurrency:
  group: daily-tech-signal
  cancel-in-progress: false

jobs:
  # ── Stage 0 · Guard ─────────────────────────────────────────────────
  guard:
    name: "⏰ Guard - 09:00 ET (DST-safe)"
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.gate.outputs.run }}
    steps:
      - name: Decide whether this trigger should run
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch - proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ='America/New_York' date +%H)
          echo "Current America/New_York hour: $HOUR"
          # Accept 09–11 ET: the scheduler routinely fires late; a drifted
          # daily run must publish, not silently no-op.
          case "$HOUR" in
            09|10|11) echo "run=true"  >> "$GITHUB_OUTPUT" ;;
            *)        echo "run=false" >> "$GITHUB_OUTPUT"
                      echo "Outside the 09:00–11:59 ET window - no-op." ;;
          esac

  # ── Stage 1 · Bronze - raw ingestion ────────────────────────────────
  bronze-collect:
    name: "🥉 Bronze - Collect news, events, history"
    needs: guard
    if: needs.guard.outputs.run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      # All AI secrets are passed through; only those actually set as repo
      # secrets are non-empty. Missing optional secrets never fail the run -
      # the provider layer falls through to the next provider and ultimately
      # to the deterministic, non-AI fallback.
      - name: Collect News, Events, and History
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: |
          python scripts/collect_news.py
          python scripts/collect_events.py
          python scripts/collect_history.py

      - name: Hand off bronze layer (raw payloads)
        uses: actions/upload-artifact@v4
        with:
          name: bronze-run-data
          path: data/runs
          retention-days: 7
          if-no-files-found: error

  # ── Stage 2 · Silver - schema/Pydantic validation gate ──────────────
  silver-validate:
    name: "🥈 Silver - Validate structured payloads"
    needs: bronze-collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull bronze layer
        uses: actions/download-artifact@v4
        with:
          name: bronze-run-data
          path: data/runs

      - name: Validate Structured Payloads
        run: python scripts/validate_payloads.py

      - name: Hand off silver layer (validated payloads)
        uses: actions/upload-artifact@v4
        with:
          name: silver-run-data
          path: data/runs
          retention-days: 7
          if-no-files-found: error

  # ── Stage 3 · Gold - deterministic rendering + final publish gate ───
  gold-generate:
    name: "🥇 Gold - Generate post + final gate"
    needs: silver-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Pull silver layer
        uses: actions/download-artifact@v4
        with:
          name: silver-run-data
          path: data/runs

      # Optional AI hero image - provider cascade (Gemini → FLUX → skip).
      # Never fails the job; the log shows which provider served (or none).
      # GEMINI_IMAGE_MODEL is a one-line swap when gemini-2.5-flash-image
      # reaches its scheduled 2026-10-02 shutdown (see generate_hero_image.py).
      - name: Generate Hero Image (cascade, never-fail)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: gemini-2.5-flash-image
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        # The script always exits 0; the `||` is a final backstop so even a
        # crash (import error, OOM, …) cannot fail the gold job.
        run: python scripts/generate_hero_image.py || echo "::warning::hero image generation crashed - continuing without an image"

      # Deterministic Jinja2 rendering (AI only for language).
      - name: Generate Jekyll Markdown Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
        run: python scripts/generate_post.py

      # Final publish gate: link validation + integrity checks. If this
      # fails, the workflow stops here and NOTHING is committed.
      - name: Validate Final Post
        run: python scripts/validate_post.py

      - name: Hand off gold layer (run data + audit trail)
        uses: actions/upload-artifact@v4
        with:
          name: gold-run-data
          path: data/runs
          retention-days: 7
          if-no-files-found: error

      - name: Hand off rendered post
        uses: actions/upload-artifact@v4
        with:
          name: gold-post
          path: _posts/*.md
          retention-days: 7
          if-no-files-found: error

      - name: Hand off hero image
        uses: actions/upload-artifact@v4
        with:
          name: gold-hero
          path: assets/img/signal
          retention-days: 7
          # v4 excludes dotfiles by default; include them so the committed
          # .gitkeep always makes this artifact exist, image or not.
          include-hidden-files: true
          if-no-files-found: warn

  # ── Stage 4 · Publish - commit only the verified post + audit trail ─
  publish:
    name: "🚀 Publish - Commit verified signal"
    needs: gold-generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull gold layer
        uses: actions/download-artifact@v4
        with:
          name: gold-run-data
          path: data/runs

      - name: Pull rendered post
        uses: actions/download-artifact@v4
        with:
          name: gold-post
          path: _posts

      - name: Pull hero image
        uses: actions/download-artifact@v4
        # If no image was produced, this artifact may not exist - that must
        # never block publishing the post itself.
        continue-on-error: true
        with:
          name: gold-hero
          path: assets/img/signal

      - name: Commit and Push Verified Signal
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "site(signal): automated daily tech signal"
          file_pattern: "_posts/*.md data/runs/**/*.json assets/img/signal/*"
          commit_user_name: "daily-tech-signal-bot"
          commit_user_email: "actions@github.com"
